name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build shared library
        run: npm run build -w packages/shared

      - name: Build all packages
        run: npm run build

  deploy-gh-pages:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build shared
        run: npm run build -w packages/shared

      - name: Set production federation manifest
        run: |
          cat > packages/host/src/federation.manifest.json << 'MANIFEST'
          {
            "remote-angular": "https://oluizcarvalho.github.io/mfe-playground/remote-angular/remoteEntry.json",
            "remote-forms": "https://oluizcarvalho.github.io/mfe-playground/remote-forms/remoteEntry.json",
            "remote-charts": "https://oluizcarvalho.github.io/mfe-playground/remote-charts/remoteEntry.json"
          }
          MANIFEST

      - name: Build remote-angular
        run: npm run build -w packages/remote-angular

      - name: Build remote-forms
        run: npm run build -w packages/remote-forms

      - name: Build remote-charts
        run: npm run build -w packages/remote-charts

      - name: Build host
        run: npm run build -w packages/host

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy
          cp -r packages/host/dist/host/browser/. deploy/
          mkdir -p deploy/remote-angular
          cp -r packages/remote-angular/dist/remote-angular/browser/. deploy/remote-angular/
          mkdir -p deploy/remote-forms
          cp -r packages/remote-forms/dist/remote-forms/browser/. deploy/remote-forms/
          mkdir -p deploy/remote-charts
          cp -r packages/remote-charts/dist/remote-charts/browser/. deploy/remote-charts/
          touch deploy/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
